# Feature #90: Binary releases — pre-compiled binaries on GitHub Releases
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: aikido
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: aikido
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: aikido
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: aikido
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: aikido.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.cross
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin aikido --features vendored-openssl
          else
            cargo build --release --target ${{ matrix.target }} --bin aikido
          fi
        shell: bash

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          tar czf aikido-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aikido-${{ matrix.target }}
          path: dist/aikido-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name 'aikido-*.tar.gz' | while read f; do
            sha256sum "$f" | awk '{print $1 "  " FILENAME}' FILENAME="$(basename "$f")"
          done > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/aikido-*.tar.gz
            artifacts/checksums.sha256
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag and lowercase repo
        id: version
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.version.outputs.repo }}:latest
