# Feature #104: Cross-platform CI — test on Linux + macOS + Windows
name: Cross-Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: "1.88.0"
          - os: macos-latest
            rust: "1.88.0"
          - os: windows-latest
            rust: "1.88.0"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      # Disable debug info on Windows to avoid PDB size overflow (LNK1318)
      - name: Configure Windows build
        if: matrix.os == 'windows-latest'
        run: |
          echo "CARGO_PROFILE_DEV_DEBUG=0" >> $env:GITHUB_ENV
          echo "CARGO_PROFILE_TEST_DEBUG=0" >> $env:GITHUB_ENV

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --all

      - name: Run unit tests
        run: cargo test --lib --all

      - name: Run integration tests
        run: cargo test --test sentaku_test --test fixture_test --test proptest_test
        # Integration tests need network for aiken stdlib download on first run
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

      - name: Run E2E tests
        run: cargo test --test cli_e2e_test
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

  # Verify MSRV (Minimum Supported Rust Version)
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV builds
        run: cargo check --all
