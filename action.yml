name: "Aikido - Aiken Security Analyzer"
description: "Run Aikido static analysis on Aiken smart contracts and upload SARIF results"
author: "Bajuzjefe"

branding:
  icon: "shield"
  color: "red"

inputs:
  project-path:
    description: "Path to the Aiken project directory"
    required: false
    default: "."
  fail-on:
    description: "Minimum severity that triggers a non-zero exit (info, low, medium, high, critical)"
    required: false
    default: "high"
  min-severity:
    description: "Minimum severity to include in output (info, low, medium, high, critical)"
    required: false
    default: "info"
  format:
    description: "Output format (text, json, sarif, markdown)"
    required: false
    default: "text"
  upload-sarif:
    description: "Upload SARIF results to GitHub Security tab"
    required: false
    default: "true"
  version:
    description: "Aikido version to install (e.g. v0.3.0, or 'latest')"
    required: false
    default: "latest"
  config:
    description: "Path to .aikido.toml config file (default: auto-detected from project path)"
    required: false
    default: ""

outputs:
  findings-count:
    description: "Total number of findings"
    value: ${{ steps.analyze.outputs.findings-count }}
  critical-count:
    description: "Number of critical findings"
    value: ${{ steps.analyze.outputs.critical-count }}
  exit-code:
    description: "Aikido exit code (0 = pass, 1 = error, 2 = findings exceed threshold)"
    value: ${{ steps.analyze.outputs.exit-code }}
  sarif-file:
    description: "Path to SARIF output file (if generated)"
    value: ${{ steps.sarif.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        OS="${{ runner.os }}"
        ARCH="${{ runner.arch }}"

        if [ "$OS" = "Linux" ] && [ "$ARCH" = "X64" ]; then
          echo "target=aikido-x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT"
        elif [ "$OS" = "Linux" ] && [ "$ARCH" = "ARM64" ]; then
          echo "target=aikido-aarch64-unknown-linux-gnu" >> "$GITHUB_OUTPUT"
        elif [ "$OS" = "macOS" ] && [ "$ARCH" = "X64" ]; then
          echo "target=aikido-x86_64-apple-darwin" >> "$GITHUB_OUTPUT"
        elif [ "$OS" = "macOS" ] && [ "$ARCH" = "ARM64" ]; then
          echo "target=aikido-aarch64-apple-darwin" >> "$GITHUB_OUTPUT"
        elif [ "$OS" = "Windows" ] && [ "$ARCH" = "X64" ]; then
          echo "target=aikido-x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT"
        else
          echo "::error::Unsupported platform: $OS-$ARCH"
          exit 1
        fi

    - name: Cache Aikido binary
      id: cache
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/aikido
        key: aikido-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: Install Aikido from release
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        REPO="Bajuzjefe/Aikido-Security-Analysis-Platform"
        TARGET="${{ steps.platform.outputs.target }}"

        if [ "${{ inputs.version }}" = "latest" ]; then
          TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            TAG=$(curl -sI "https://github.com/$REPO/releases/latest" | grep -i location | sed 's|.*/||' | tr -d '\r\n')
          fi
        else
          TAG="${{ inputs.version }}"
        fi

        URL="https://github.com/$REPO/releases/download/$TAG/${TARGET}.tar.gz"
        echo "Downloading $URL..."
        curl -fsSL "$URL" | tar xz
        chmod +x aikido
        sudo mv aikido /usr/local/bin/aikido

    - name: Fallback to cargo install
      if: steps.cache.outputs.cache-hit != 'true' && failure()
      shell: bash
      run: |
        echo "Binary download failed, falling back to cargo install..."
        if ! command -v cargo &> /dev/null; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
        fi
        if [ "${{ inputs.version }}" = "latest" ]; then
          cargo install --git https://github.com/Bajuzjefe/Aikido-Security-Analysis-Platform aikido-cli
        else
          cargo install --git https://github.com/Bajuzjefe/Aikido-Security-Analysis-Platform --tag "${{ inputs.version }}" aikido-cli
        fi

    - name: Run analysis (text)
      id: analyze
      shell: bash
      run: |
        set +e

        CONFIG_FLAG=""
        if [ -n "${{ inputs.config }}" ]; then
          CONFIG_FLAG="--config ${{ inputs.config }}"
        fi

        OUTPUT=$(aikido "${{ inputs.project-path }}" \
          --min-severity "${{ inputs.min-severity }}" \
          --fail-on "${{ inputs.fail-on }}" \
          $CONFIG_FLAG \
          2>&1)
        EXIT_CODE=$?

        echo "$OUTPUT"
        echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        # Parse findings count from summary line
        FINDINGS=$(echo "$OUTPUT" | grep -oE '[0-9]+ critical' | grep -oE '[0-9]+' || echo "0")
        echo "critical-count=$FINDINGS" >> "$GITHUB_OUTPUT"
        TOTAL=$(echo "$OUTPUT" | grep -oE '[0-9]+ critical, [0-9]+ high, [0-9]+ medium, [0-9]+ low, [0-9]+ info' | grep -oE '[0-9]+' | paste -sd+ - | bc || echo "0")
        echo "findings-count=$TOTAL" >> "$GITHUB_OUTPUT"

    - name: Generate SARIF
      id: sarif
      if: inputs.upload-sarif == 'true'
      shell: bash
      run: |
        CONFIG_FLAG=""
        if [ -n "${{ inputs.config }}" ]; then
          CONFIG_FLAG="--config ${{ inputs.config }}"
        fi

        aikido "${{ inputs.project-path }}" \
          --format sarif \
          --min-severity "${{ inputs.min-severity }}" \
          $CONFIG_FLAG \
          > aikido-results.sarif 2>/dev/null || true

        echo "sarif-file=aikido-results.sarif" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to GitHub Security
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: aikido-results.sarif
        category: aikido

    - name: Check threshold
      shell: bash
      run: |
        if [ "${{ steps.analyze.outputs.exit-code }}" = "2" ]; then
          echo "::error::Aikido found findings exceeding the --fail-on ${{ inputs.fail-on }} threshold"
          exit 2
        fi
